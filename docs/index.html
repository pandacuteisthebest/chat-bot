<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT-like Chatbot Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-color: #2c2c2e;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .chat-container {
            width: 400px;
            height: 500px;
            border: 1px solid #444;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 20px auto;
        }
        .message-display {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }
        .input-area {
            display: flex;
            padding: 10px;
            background: #3c3c3e;
        }
        .input-area input {
            flex-grow: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }
        .input-area button {
            padding: 10px;
            border: none;
            background: #4cd964;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="message-display" id="messageDisplay"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message...">
            <button id="sendButton"><i class="fas fa-paper-plane"></i> Send</button>
        </div>
    </div>
    <script>
        const sendButton = document.getElementById('sendButton');
        const userInput = document.getElementById('userInput');
        const messageDisplay = document.getElementById('messageDisplay');

        function appendMessage(message, isBot = false) {
            const messageElement = document.createElement('div');
            messageElement.textContent = (isBot ? 'Bot: ' : 'You: ') + message;
            messageDisplay.appendChild(messageElement);
            messageDisplay.scrollTop = messageDisplay.scrollHeight;
        }

        sendButton.addEventListener('click', async () => {
            const userMessage = userInput.value;
            if (userMessage) {
                appendMessage(userMessage);
                userInput.value = '';
                // Send data to GitHub API here
                const response = await fetch('https://api.github.com/repos/pandacuteisthebest/chat-bot/contents/chatbot_config.json', {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'token YOUR_GITHUB_TOKEN',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        "message": "Update conversation",
                        "content": btoa(JSON.stringify({userMessage, datetime: new Date().toISOString()})),
                    }),
                });
                const data = await response.json();
                appendMessage(data.content); // display bot response
            }
        });
    </script>
</body>
</html>
